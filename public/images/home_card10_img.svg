<svg xmlns="http://www.w3.org/2000/svg" width="180" height="120" viewBox="0 0 180 120">
  <!-- 배경: 미드나잇차콜 -->
  <rect width="180" height="120" fill="#1A1C1E"/>
  <!-- 브라우저 창 (흰색) -->
  <rect x="8" y="8" width="164" height="104" rx="6" fill="#FFFFFF"/>
  <!-- 브라우저 상단 바 -->
  <rect x="8" y="8" width="164" height="22" rx="6" fill="#F5F5F5"/>
  <rect x="8" y="22" width="164" height="8" fill="#F5F5F5"/>
  <!-- 버튼 -->
  <circle cx="20" cy="19" r="3" fill="#FF5F56" opacity="0.70"/>
  <circle cx="29" cy="19" r="3" fill="#FFBD2E" opacity="0.70"/>
  <circle cx="38" cy="19" r="3" fill="#27C93F" opacity="0.70"/>
  <!-- URL 바 -->
  <rect x="46" y="13" width="118" height="12" rx="6"
        fill="#FFFFFF" stroke="#E0E0E0" stroke-width="0.8"/>
  <text x="105" y="22" font-family="sans-serif" font-size="6" fill="#888"
        text-anchor="middle">route.app/seo-guide</text>
  <!-- 검색 결과 1위 (강조) -->
  <rect x="16" y="34" width="148" height="20" rx="3"
        fill="#1A1C1E" opacity="0.06" stroke="#1A1C1E" stroke-width="0.8"/>
  <rect x="18" y="36" width="22" height="16" rx="2" fill="#1A1C1E" opacity="0.88"/>
  <text x="29" y="47" font-family="sans-serif" font-size="8" font-weight="700"
        fill="#FFFFFF" text-anchor="middle">#1</text>
  <rect x="46" y="40" width="90" height="5" rx="2" fill="#1A1C1E" opacity="0.72"/>
  <rect x="46" y="48" width="60" height="3" rx="1" fill="#1A1C1E" opacity="0.30"/>
  <!-- 2위 -->
  <rect x="16" y="58" width="148" height="14" rx="3" fill="#F8F8F8" stroke="#EEE" stroke-width="0.8"/>
  <rect x="46" y="63" width="76" height="4" rx="2" fill="#1A1C1E" opacity="0.40"/>
  <rect x="46" y="69" width="52" height="3" rx="1" fill="#1A1C1E" opacity="0.20"/>
  <!-- 3위 -->
  <rect x="16" y="76" width="148" height="14" rx="3" fill="#F8F8F8" stroke="#EEE" stroke-width="0.8"/>
  <rect x="46" y="81" width="64" height="4" rx="2" fill="#1A1C1E" opacity="0.30"/>
  <rect x="46" y="87" width="44" height="3" rx="1" fill="#1A1C1E" opacity="0.18"/>
  <!-- H1 태그 -->
  <rect x="16" y="96" width="80" height="12" rx="3" fill="#F8F8F8"/>
  <text x="56" y="105" font-family="Courier New,monospace" font-size="7"
        fill="#D4A853" text-anchor="middle">&lt;h1&gt; SEO &lt;/h1&gt;</text>
  <!-- 돋보기 -->
  <circle cx="162" cy="105" r="5" fill="none" stroke="#1A1C1E" stroke-width="1.2" opacity="0.40"/>
  <line x1="166" y1="109" x2="169" y2="112" stroke="#1A1C1E" stroke-width="1.2"
        stroke-linecap="round" opacity="0.40"/>
</svg>