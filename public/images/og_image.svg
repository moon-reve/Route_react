  <circle cx="900" cy="315" r="230" fill="none" stroke="#E8941A" stroke-width="0.6" opacity="0.1"/>
  <circle cx="900" cy="315" r="150" fill="none" stroke="#E8941A" stroke-width="0.4" opacity="0.07"/>

  <!-- Constellation lines (thin, elegant) -->
  <g stroke="#1A1C1E" stroke-width="0.6" opacity="0.14" fill="none">
    <line x1="788" y1="178" x2="896" y2="128"/>
    <line x1="896" y1="128" x2="990" y2="204"/>
    <line x1="990" y1="204" x2="1068" y2="158"/>
    <line x1="990" y1="204" x2="940" y2="292"/>
    <line x1="940" y1="292" x2="816" y2="310"/>
    <line x1="816" y1="310" x2="748" y2="380"/>
    <line x1="940" y1="292" x2="1014" y2="348"/>
    <line x1="1014" y1="348" x2="996" y2="440"/>
    <line x1="816" y1="310" x2="864" y2="416"/>
  </g>

  <!-- Small dots -->
  <g fill="#1A1C1E" opacity="0.28">
    <circle cx="788" cy="178" r="2.5"/>
    <circle cx="990" cy="204" r="2.5"/>
    <circle cx="816" cy="310" r="2.5"/>
    <circle cx="1014" cy="348" r="2.5"/>
    <circle cx="996" cy="440" r="2.5"/>
    <circle cx="748" cy="380" r="2.5"/>
    <circle cx="864" cy="416" r="2.5"/>
    <circle cx="1068" cy="158" r="2"/>
