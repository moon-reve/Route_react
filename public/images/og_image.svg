  <text x="186" y="82" font-size="13" font-weight="400" fill="#E8941A" letter-spacing="0.01em">AI 커리어 루트 플랫폼</text>

  <!-- ② Headline -->
  <text x="80" y="210" font-size="42" font-weight="800" fill="#1A1C1E" letter-spacing="-0.025em">당신의 커리어,</text>
  <text x="80" y="268" font-size="42" font-weight="800" fill="#1A1C1E" letter-spacing="-0.025em">아직 그려지지 않은</text>
  <text x="80" y="326" font-size="42" font-weight="800" fill="#E8941A" letter-spacing="-0.025em">별자리입니다.</text>

  <!-- ③ Sub description -->
  <text x="80" y="386" font-size="16" font-weight="400" fill="#888888" letter-spacing="-0.01em">목표·스킬·시간에 맞춘 맞춤형 12주 AI 커리어 루트</text>

  <!-- ④ Tag pills -->
  <rect x="80" y="420" width="94" height="26" rx="13" fill="#1A1C1E" fill-opacity="0.06"/>
  <text x="127" y="437" text-anchor="middle" font-size="11" fill="#555555">#커리어설계</text>

  <rect x="184" y="420" width="78" height="26" rx="13" fill="#1A1C1E" fill-opacity="0.06"/>
  <text x="223" y="437" text-anchor="middle" font-size="11" fill="#555555">#AI루트</text>

  <rect x="272" y="420" width="86" height="26" rx="13" fill="#1A1C1E" fill-opacity="0.06"/>
  <text x="315" y="437" text-anchor="middle" font-size="11" fill="#555555">#12주챌린지</text>

  <!-- ⑤ Bottom divider + URL -->
  <line x1="80" y1="498" x2="560" y2="498" stroke="#E8E8E8" stroke-width="1"/>
  <text x="80" y="540" font-size="13" font-weight="400" fill="#BBBBBB" letter-spacing="0.01em">route.vercel.app</text>

</svg>
