  <circle cx="896" cy="128" r="3.5" fill="#E8941A" opacity="0.65"/>
  <circle cx="940" cy="292" r="4.5" fill="#E8941A" opacity="0.75"/>

  <!-- Sparkle at (896,128) -->
  <path d="M896,113 L897.8,124.2 L910,128 L897.8,131.8 L896,143 L894.2,131.8 L882,128 L894.2,124.2 Z"
