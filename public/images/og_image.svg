  <rect x="80" y="56" width="38" height="38" rx="9" fill="#1A1C1E"/>
  <text x="99" y="82" text-anchor="middle" font-size="17" font-weight="800" fill="#E8941A">R</text>
  <text x="130" y="82" font-size="20" font-weight="700" fill="#1A1C1E" letter-spacing="-0.02em">Route</text>
