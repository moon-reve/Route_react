<svg xmlns="http://www.w3.org/2000/svg" width="180" height="120" viewBox="0 0 180 120">
  <!-- 배경: 흰색 -->
  <rect width="180" height="120" fill="#FFFFFF"/>
  <!-- 상승 그래프 채우기 -->
  <polygon points="12,100 36,82 60,70 84,54 108,44 132,30 156,16 156,112 12,112"
           fill="#1A1C1E" opacity="0.07"/>
  <!-- 상승 꺾은선 -->
  <polyline points="12,100 36,82 60,70 84,54 108,44 132,30 156,16"
            fill="none" stroke="#1A1C1E" stroke-width="2.5"
            stroke-linecap="round" stroke-linejoin="round" opacity="0.85"/>
  <!-- 데이터 포인트 -->
  <circle cx="12"  cy="100" r="4" fill="#1A1C1E" opacity="0.65"/>
  <circle cx="60"  cy="70"  r="4" fill="#1A1C1E" opacity="0.65"/>
  <circle cx="108" cy="44"  r="4" fill="#1A1C1E" opacity="0.65"/>
  <circle cx="156" cy="16"  r="5" fill="#D4A853" opacity="0.95"/>
  <!-- 화살표 끝 -->
  <path d="M152 12 L160 16 L154 20" stroke="#D4A853" stroke-width="1.8" fill="none"
        stroke-linecap="round" stroke-linejoin="round"/>
  <!-- CTA 버튼 -->
  <rect x="100" y="6" width="72" height="18" rx="9" fill="#1A1C1E" opacity="0.90"/>
  <text x="136" y="18" font-family="sans-serif" font-size="8" font-weight="700"
        fill="#FFFFFF" text-anchor="middle">Click Here →</text>
  <!-- 컬러 심리 원 -->
  <circle cx="24"  cy="82" r="10" fill="#1A1C1E" opacity="0.75"/>
  <circle cx="46"  cy="82" r="10" fill="#D4A853" opacity="0.70"/>
  <circle cx="68"  cy="82" r="10" fill="#8FAF8A" opacity="0.65"/>
  <!-- +% -->
  <text x="150" y="46" font-family="Georgia,serif" font-size="20" font-weight="700"
        fill="#D4A853" opacity="0.75">+%</text>
  <circle cx="166" cy="108" r="1.5" fill="#D4A853" opacity="0.38"/>
</svg>