<svg xmlns="http://www.w3.org/2000/svg" width="180" height="120" viewBox="0 0 180 120">

  <rect width="180" height="120" fill="#F2EFF9"/>
  <!-- 피라미드 레이어 4단 (상단→하단) -->
  <!-- Must Have (최상단) -->
  <rect x="62" y="10" width="56" height="20" rx="4" fill="#B8A8D4" opacity="0.95"/>
  <text x="90" y="23" font-family="sans-serif" font-size="8" font-weight="700"
        fill="#FFFFFF" text-anchor="middle">MUST HAVE</text>
  <!-- Should Have -->
  <rect x="42" y="34" width="96" height="18" rx="4" fill="#B8A8D4" opacity="0.68"/>
  <text x="90" y="46" font-family="sans-serif" font-size="8" fill="#FFFFFF"
        text-anchor="middle">SHOULD HAVE</text>
  <!-- Could Have -->
  <rect x="20" y="56" width="140" height="18" rx="4" fill="#B8A8D4" opacity="0.40"/>
  <text x="90" y="68" font-family="sans-serif" font-size="8" fill="#4A3A6A"
        text-anchor="middle">COULD HAVE</text>
  <!-- Won't Have -->
  <rect x="8" y="78" width="164" height="18" rx="4" fill="#B8A8D4" opacity="0.20"/>
  <text x="90" y="90" font-family="sans-serif" font-size="8" fill="#7A6A9A"
        text-anchor="middle">WON'T HAVE</text>
  <!-- 사이드 라벨: MVP -->
  <text x="164" y="58" font-family="Georgia,serif" font-size="28" font-weight="700"
        fill="#B8A8D4" opacity="0.22" transform="rotate(90,164,58)">MVP</text>
  <!-- 장식 점 -->
  <circle cx="160" cy="10" r="2" fill="#B8A8D4" opacity="0.48"/>
  <circle cx="14" cy="106" r="1.5" fill="#D4A853" opacity="0.35"/>
</svg>