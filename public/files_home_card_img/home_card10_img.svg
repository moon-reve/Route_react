<svg xmlns="http://www.w3.org/2000/svg" width="180" height="120" viewBox="0 0 180 120">

  <rect width="180" height="120" fill="#FDF0F4"/>
  <!-- 브라우저 창 -->
  <rect x="8" y="8" width="164" height="104" rx="6"
        fill="#FFFFFF" stroke="#E8A4B8" stroke-width="1.2"/>
  <!-- 브라우저 상단 바 -->
  <rect x="8" y="8" width="164" height="22" rx="6" fill="#FDF0F4"/>
  <rect x="8" y="22" width="164" height="8" fill="#FDF0F4"/>
  <!-- URL 바 -->
  <rect x="32" y="12" width="104" height="10" rx="5"
        fill="#FFFFFF" stroke="#E8D0D8" stroke-width="0.8"/>
  <text x="84" y="20" font-family="sans-serif" font-size="6" fill="#888"
        text-anchor="middle">route.app/blog/seo-guide</text>
  <!-- 돋보기 -->
  <circle cx="22" cy="17" r="4" fill="none" stroke="#E8A4B8" stroke-width="1.2"/>
  <line x1="25" y1="20" x2="28" y2="23" stroke="#E8A4B8" stroke-width="1.2"
        stroke-linecap="round"/>
  <!-- 검색 결과 목록 -->
  <!-- 1위 (강조) -->
  <rect x="16" y="34" width="148" height="18" rx="3"
        fill="#FDF0F4" stroke="#E8A4B8" stroke-width="1"/>
  <rect x="18" y="36" width="20" height="14" rx="2" fill="#E8A4B8" opacity="0.85"/>
  <text x="28" y="46" font-family="sans-serif" font-size="7" font-weight="700"
        fill="#FFFFFF" text-anchor="middle">#1</text>
  <rect x="44" y="39" width="80" height="5" rx="2" fill="#1A1C1E" opacity="0.65"/>
  <rect x="44" y="47" width="56" height="3" rx="1" fill="#1A1C1E" opacity="0.28"/>
  <!-- 2위 -->
  <rect x="16" y="56" width="148" height="14" rx="3" fill="#FFFFFF" stroke="#EEE" stroke-width="0.8"/>
  <rect x="44" y="61" width="70" height="4" rx="2" fill="#1A1C1E" opacity="0.38"/>
  <rect x="44" y="67" width="50" height="3" rx="1" fill="#1A1C1E" opacity="0.20"/>
  <!-- 3위 -->
  <rect x="16" y="74" width="148" height="14" rx="3" fill="#FFFFFF" stroke="#EEE" stroke-width="0.8"/>
  <rect x="44" y="79" width="60" height="4" rx="2" fill="#1A1C1E" opacity="0.30"/>
  <rect x="44" y="85" width="40" height="3" rx="1" fill="#1A1C1E" opacity="0.18"/>
  <!-- H1 태그 표시 -->
  <rect x="16" y="94" width="60" height="12" rx="3" fill="#1A1C1E" opacity="0.08"/>
  <text x="46" y="103" font-family="Courier New,monospace" font-size="7"
